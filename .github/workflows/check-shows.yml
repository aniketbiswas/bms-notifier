name: Check BookMyShow Shows

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .last_state
          key: bms-state-${{ github.run_id }}
          restore-keys: bms-state-

      - name: Seed state if first run
        run: |
          if [ ! -f .last_state ]; then
            echo "none" > .last_state
          fi

      - name: Check for shows
        env:
          TARGET_DATE: "20260426"
          EVENT_CODES: "ET00451760,ET00492371"
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_shows.py

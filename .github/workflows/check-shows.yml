name: Check BookMyShow Shows

on:
  schedule:
    # Runs at :07, :22, :37, :52 past every hour (avoids top-of-hour congestion)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
    inputs:
      movie:
        description: 'Movie name (e.g. Project Hail Mary)'
        required: false
      city:
        description: 'City (e.g. Hyderabad)'
        required: false
      date:
        description: 'Date in YYYYMMDD format (e.g. 20260426)'
        required: false
      theatres:
        description: 'Theatres to watch, comma-separated (e.g. AMB Cinemas, Allu Cinemas)'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .last_state
          key: bms-state-${{ github.run_id }}
          restore-keys: bms-state-

      - name: Seed state if first run
        run: |
          if [ ! -f .last_state ]; then
            echo "none" > .last_state
          fi

      - name: Check for shows
        env:
          # Manual inputs override config.yml
          MOVIE: ${{ inputs.movie }}
          CITY: ${{ inputs.city }}
          TARGET_DATE: ${{ inputs.date }}
          THEATRES: ${{ inputs.theatres }}
          # Email config from secrets
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_shows.py
